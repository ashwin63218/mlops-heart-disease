# =============================================================================
# dashboards/default.yml
# Tells Grafana where to find dashboard JSON files to auto-load.
# =============================================================================

apiVersion: 1

providers:
  - name: "Heart Disease MLOps"
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboard_json