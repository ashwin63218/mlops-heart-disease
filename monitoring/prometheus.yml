# =============================================================================
# datasources/prometheus.yml
# Auto-provisions Prometheus as the default datasource in Grafana.
# No manual setup required — datasource is ready on first boot.
# =============================================================================

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'heart-disease-api'
    static_configs:
      - targets: ['api:8000']